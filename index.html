<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>left</title>
   <link rel="stylesheet" href="./src/output.css">
</head>

<body>
   <header class="flex items-center justify-between p-[20px] max-w-[1300px] mx-auto">
      <div class="w-[50px] h-[50px]"></div>
      <div class="flex gap-[30px] text-[20px] text-[#222222]">
         <p>Booking</p>
         <p>Facilities</p>
         <p>About Us</p>
         <p>Location</p>
         <p>Contact</p>
      </div>
      <a class="px-[20px] py-[10px] bg-[green] text-white rounded-[35px]" href="./src/righthtml.html">Login</a>
   </header>

   <section class="bg-white p-6 md:p-12 font-sans mb-[50px]">

      <div
         class="relative max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 items-stretch rounded-[50px] overflow-visible">

         <div
            class="bg-[#F6FBFA] p-10 md:p-20 flex flex-col justify-center rounded-l-[50px] rounded-r-[50px] md:rounded-r-none relative z-10">

            <h1 class="text-black text-5xl md:text-6xl font-extrabold leading-tight mb-6">
               Find your perfect place to stay
            </h1>

            <p class="text-gray-500 text-lg leading-relaxed mb-10 max-w-md">
               Lorem Ipsum is simply dummy text of the printing and typesetting industry.
            </p>

            <a class="inline-flex items-center gap-4 group">
               <div
                  class="bg-white p-4 rounded-full shadow-lg border border-gray-100">
                  <span
                     class="text-[#24AB70] text-3xl font-black block w-8 h-8 text-center"><img src="./forimg/Layer 2.png" alt=""></span>
               </div>
               <span class="text-black font-semibold text-lg">Watch video</span>
            </a>

         </div>

         <div class="w-full relative">
            <div class="absolute inset-0 rounded-r-[50px] overflow-hidden">
               <img src="./forimg/image (13).png" alt="House view" class="w-full h-full object-cover object-left">
            </div>
         </div>

         <div
            class="absolute top-[390px] md:-bottom-12 left-6 right-6 md:left-20 md:right-20 z-30 transform translate-y-1/2">
            <div
               class="bg-white p-4 md:p-6 rounded-full shadow-2xl flex items-center gap-3 border border-gray-100 flex-wrap md:flex-nowrap justify-between">

               <div class="flex items-center gap-3 p-3 flex-grow border-r border-gray-100 last:border-r-0">
                  <div class="text-[#24AB70] text-xl"><img src="./forimg/pin 1.png" alt=""></div>
                  <div>
                     <div class="text-black font-semibold text-sm">Location</div>
                     <input type="text" placeholder="United States"
                        class="text-gray-400 text-xs w-full focus:outline-none placeholder:text-gray-400">
                  </div>
               </div>

               <div class="flex items-center gap-3 p-3 flex-grow border-r border-gray-100 last:border-r-0">
                  <div class="text-[#24AB70] text-xl"><img src="./forimg/calendar 1.png" alt=""></div>
                  <div>
                     <div class="text-black font-semibold text-sm">Check in</div>
                     <input type="text" placeholder="10 Jun 2021"
                        class="text-gray-400 text-xs w-full focus:outline-none placeholder:text-gray-400">
                  </div>
               </div>

               <div class="flex items-center gap-3 p-3 flex-grow border-r border-gray-100 last:border-r-0">
                  <div class="text-[#24AB70] text-xl"><img src="./forimg/calendar 1.png" alt=""></div>
                  <div>
                     <div class="text-black font-semibold text-sm">Check out</div>
                     <input type="text" placeholder="15 Jun 2021"
                        class="text-gray-400 text-xs w-full focus:outline-none placeholder:text-gray-400">
                  </div>
               </div>

               <div class="flex items-center gap-3 p-3 flex-grow">
                  <div class="text-[#24AB70] text-xl"><img src="./forimg/person 1.png" alt=""></div>
                  <div>
                     <div class="text-black font-semibold text-sm">Rooms for</div>
                     <input type="text" placeholder="1 room, 2 guests"
                        class="text-gray-400 text-xs w-full focus:outline-none placeholder:text-gray-400">
                  </div>
               </div>

               <button
                  class="bg-[#24AB70] text-white px-8 py-4 md:py-5 rounded-full flex items-center gap-3 font-semibold hover:bg-[#1e8f5d] transition-all whitespace-nowrap min-w-[160px] justify-center shadow-lg">
                  <span class="text-xl"><img src="./forimg/search-outline 1.png" alt=""></span>
                  Search...
               </button>

            </div>
         </div>
      </div>
   </section>
</body>

</html>
